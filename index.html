<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>APEX - README Generator</title>
    <link href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css" rel="stylesheet">
    <style>
        body { font-family: sans-serif; }
        .container { max-width: 800px; }
        textarea { min-height: 150px; }
    </style>
</head>
<body class="bg-gray-100 flex items-center justify-center p-4">
    <div class="container bg-white shadow-lg rounded-lg p-6 space-y-6">
        <h1 class="text-3xl font-bold text-center text-gray-800">Generate Your README.md</h1>
        <p class="text-center text-gray-600">Quickly create professional GitHub READMEs.</p>

        <form id="readmeForm" class="space-y-4">
            <div>
                <label for="projectName" class="block text-sm font-medium text-gray-700">Project Name</label>
                <input type="text" id="projectName" class="mt-1 block w-full border border-gray-300 rounded-md shadow-sm p-2">
            </div>
            <div>
                <label for="description" class="block text-sm font-medium text-gray-700">Description</label>
                <textarea id="description" class="mt-1 block w-full border border-gray-300 rounded-md shadow-sm p-2"></textarea>
            </div>
            <div>
                <label for="features" class="block text-sm font-medium text-gray-700">Features (comma-separated)</label>
                <input type="text" id="features" class="mt-1 block w-full border border-gray-300 rounded-md shadow-sm p-2">
            </div>
            <div>
                <label for="installation" class="block text-sm font-medium text-gray-700">Installation</label>
                <textarea id="installation" class="mt-1 block w-full border border-gray-300 rounded-md shadow-sm p-2" placeholder="e.g., `npm install`"></textarea>
            </div>
            <div>
                <label for="usage" class="block text-sm font-medium text-gray-700">Usage</label>
                <textarea id="usage" class="mt-1 block w-full border border-gray-300 rounded-md shadow-sm p-2" placeholder="e.g., `node index.js`"></textarea>
            </div>
            <div>
                <label for="license" class="block text-sm font-medium text-gray-700">License</label>
                <input type="text" id="license" value="MIT" class="mt-1 block w-full border border-gray-300 rounded-md shadow-sm p-2">
            </div>
            
            <button type="submit" class="w-full bg-blue-600 text-white py-2 px-4 rounded-md hover:bg-blue-700 focus:outline-none focus:ring-2 focus:ring-blue-500 focus:ring-offset-2">
                Generate README
            </button>
        </form>

        <div id="output" class="hidden mt-6">
            <h2 class="text-xl font-bold text-gray-800 mb-2">Your README.md</h2>
            <textarea id="renderedReadme" class="block w-full border border-gray-300 rounded-md shadow-sm p-4 bg-gray-50 text-gray-800" readonly></textarea>
            <button onclick="copyToClipboard()" class="mt-2 bg-green-600 text-white py-2 px-4 rounded-md hover:bg-green-700 focus:outline-none focus:ring-2 focus:ring-green-500 focus:ring-offset-2">Copy to Clipboard</button>
        </div>
    </div>

    <script>
        document.getElementById('readmeForm').addEventListener('submit', function(event) {
            event.preventDefault();

            const projectName = document.getElementById('projectName').value || 'My Project';
            const description = document.getElementById('description').value || 'A brief description of my awesome project.';
            const features = document.getElementById('features').value.split(',').map(f => f.trim()).filter(Boolean);
            const installation = document.getElementById('installation').value || 'bash\nnpm install\n';
            const usage = document.getElementById('usage').value || 'bash\nnpm start\n';
            const license = document.getElementById('license').value || 'MIT';

            let readmeContent = `# ${projectName}\n\n`;
            readmeContent += `${description}\n\n`;

            if (features.length > 0) {
                readmeContent += `## Features\n\n`;
                features.forEach(feature => {
                    readmeContent += `- ${feature}\n`;
                });
                readmeContent += `\n`;
            }

            readmeContent += `## Installation\n\n${installation}\n\n`;
            readmeContent += `## Usage\n\n${usage}\n\n`;
            readmeContent += `## License\n\nThis project is licensed under the ${license} License.\n`;

            document.getElementById('renderedReadme').value = readmeContent;
            document.getElementById('output').classList.remove('hidden');
        });

        function copyToClipboard() {
            const textarea = document.getElementById('renderedReadme');
            textarea.select();
            document.execCommand('copy');
            alert('README content copied to clipboard!');
        }
    </script>
</body>
</html>
